<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/main.css">
    <link rel="playfairdisplay" href="assets/Playfair_Display/PlayfairDisplay-VariableFont_wght.ttf">
    <title>To Do List</title>
</head>
<body>
    <header>
        <h1>Glow-Up To Do List</h1>
        <img id="heart" src="images/pink_heart.png" alt="pink heart image">
        <nav>
            <h2 class="hidden">Main Nav</h2>
            <ul>
                <li>Tips</li>
                <li>Products</li>
                <li>Resources</li>
                <li>References</li>
                <li id="more-button">More</li>
            </ul>
        </nav>
    </header>

    <main>
        <article id="todo">
            <h2>To-do</h2>
            <ul class="do">
                <li>Item</li>
                <li>Item</li>
                <li>Item</li>
                <li>Item</li>
                <li>Item</li>
                <li>Item</li>
            </ul>
        </article>
        <article id="inprogress">
            <h2>In progress</h2>
            <ul class="progress">
                <li><input type="checkbox"><span>Item</span></li>
                <li><input type="checkbox"><span>Item</span></li>
                <li><input type="checkbox"><span>Item</span></li>
                <li><input type="checkbox"><span>Item</span></li>
                <li><input type="checkbox"><span>Item</span></li>
                <li><input type="checkbox"><span>Item</span></li>
            </ul>
        </article>
        <article id="done">
            <h2>Done</h2>
            <ul class="fin">
                <li><input type="checkbox"><span>Item</span></li>
                <li><input type="checkbox"><span>Item</span></li>
                <li><input type="checkbox"><span>Item</span></li>
                <li><input type="checkbox"><span>Item</span></li>
                <li><input type="checkbox"><span>Item</span></li>
                <li><input type="checkbox"><span>Item</span></li>
            </ul>
        </article>
    </main>

    <footer>



    </footer>
</body>
</html>
